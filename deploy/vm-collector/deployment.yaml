apiVersion: apps/v1
kind: Deployment
metadata:
  name: argos-vm-collector
  namespace: argos-system
  labels:
    app.kubernetes.io/name: argos
    app.kubernetes.io/component: vm-collector
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: argos
      app.kubernetes.io/component: vm-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argos
        app.kubernetes.io/component: vm-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argos-vm-collector
          image: ghcr.io/sthalbert/argos-vm-collector:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: argos-vm-collector-config
            - secretRef:
                name: argos-vm-collector-credentials
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
