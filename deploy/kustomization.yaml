apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Run `kubectl apply -k deploy/` from the repo root to apply the full stack.
# secrets.example.yaml is intentionally NOT listed here — copy it, fill in
# real values, and apply it separately so the example file can't be
# accidentally deployed with placeholder credentials.
resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
