{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "argos.fullname" . }}-cluster-reader
  labels:
    {{- include "argos.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["list"]
{{- end }}
