{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "argos.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argos.labels" . | nindent 4 }}
    app.kubernetes.io/component: daemon
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
